name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'true' to confirm production deployment"
        required: true
      resource_group:
        description: "Resource group name (optional)"
        required: false
      template_file:
        description: "Bicep file path (optional)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-prod:
    if: ${{ inputs.confirm == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Subscription
        run: |
          az account show --query "{name:name, id:id, user:user.name}" -o json

      - name: Deploy (optional)
        if: ${{ inputs.resource_group != '' && inputs.template_file != '' }}
        run: |
          az deployment group create \
            --resource-group "${{ inputs.resource_group }}" \
            --template-file "${{ inputs.template_file }}"

      - name: Summary
        run: |
          echo "Prod workflow completed."
